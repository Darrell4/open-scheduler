# Local development infrastructure for open-scheduler.
# Start with: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: openscheduler-postgres
    environment:
      POSTGRES_DB: openscheduler
      POSTGRES_USER: openscheduler
      POSTGRES_PASSWORD: openscheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openscheduler -d openscheduler"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
