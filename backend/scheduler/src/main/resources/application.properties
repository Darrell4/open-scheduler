spring.application.name=scheduler

# --- Datasource (defaults match docker-compose.yml; override via env vars) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/openscheduler}
spring.datasource.username=${DB_USERNAME:openscheduler}
spring.datasource.password=${DB_PASSWORD:openscheduler}

# --- JPA ---
# Flyway owns the schema; Hibernate only validates it matches the entities.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
